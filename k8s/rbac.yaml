apiVersion: v1
kind: ServiceAccount
metadata:
  name: thumbworx-monitor

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: thumbworx-reader

rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
    verbs:
      - get
      - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: thumbworx-reader-binding

subjects:
  - kind: ServiceAccount
    name: thumbworx-monitor

roleRef:
  kind: Role
  name: thumbworx-reader
  apiGroup: rbac.authorization.k8s.io