apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: thumbworx-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
      containers:
        - name: frontend
          image: thumbworx-frontend:latest
          imagePullPolicy: Never
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
