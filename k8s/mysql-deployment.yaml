apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom: { secretKeyRef: { name: thumbworx-db-secret, key: DB_DATABASE } }
            - name: MYSQL_USER
              valueFrom: { secretKeyRef: { name: thumbworx-db-secret, key: DB_USERNAME } }
            - name: MYSQL_PASSWORD
              valueFrom: { secretKeyRef: { name: thumbworx-db-secret, key: DB_PASSWORD } }
            - name: MYSQL_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: thumbworx-db-secret, key: DB_ROOT_PASSWORD } }
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
