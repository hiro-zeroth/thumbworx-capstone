apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: thumbworx-backend:latest
          imagePullPolicy: Never
          command: ["sh", "-c", "sed -i 's/SESSION_DRIVER=database/SESSION_DRIVER=file/' .env && php artisan serve --host=0.0.0.0 --port=8000"]
          env:
            - name: DB_CONNECTION
              value: "mysql"
            - name: APP_ENV
              value: "production"
            - name: APP_DEBUG
              value: "false"
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: SESSION_DRIVER
              value: "file"
            - name: APP_URL
              value: "http://localhost:8080"
            - name: ASSET_URL
              value: "http://localhost:8080"
            - name: DB_DATABASE
              valueFrom: { secretKeyRef: { name: thumbworx-db-secret, key: DB_DATABASE } }
            - name: DB_USERNAME
              valueFrom: { secretKeyRef: { name: thumbworx-db-secret, key: DB_USERNAME } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: thumbworx-db-secret, key: DB_PASSWORD } }
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
